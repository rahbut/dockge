name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
  workflow_dispatch:  # Allow manual trigger

permissions: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-fund

      - name: Build frontend
        run: npm run build:frontend

      - name: Build and push Docker image
        run: >
          docker buildx build
          --platform linux/amd64,linux/arm64
          -t ghcr.io/rahbut/dockge:latest
          --target release
          -f ./docker/Dockerfile .
          --push
        env:
          DOCKER_BUILDKIT: 1

      - name: Report image size
        run: |
          manifest=$(docker buildx imagetools inspect ghcr.io/rahbut/dockge:latest --raw)
          header="| Platform | Compressed Size |"
          separator="|----------|----------------|"
          echo "## Image Size Report" | tee -a $GITHUB_STEP_SUMMARY
          echo "" | tee -a $GITHUB_STEP_SUMMARY
          echo "$header" | tee -a $GITHUB_STEP_SUMMARY
          echo "$separator" | tee -a $GITHUB_STEP_SUMMARY
          for arch in amd64 arm64; do
            raw=$(echo "$manifest" | jq --arg arch "$arch" '[.manifests[] | select(.platform.architecture == $arch)] | .[0].size // empty')
            if [ -n "$raw" ]; then
              size=$(echo "$raw" | numfmt --to=iec-i --suffix=B)
            else
              size="N/A"
            fi
            echo "| $arch | $size |" | tee -a $GITHUB_STEP_SUMMARY
          done
